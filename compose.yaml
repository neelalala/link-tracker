services:
  bot:
    build:
      context: .
      dockerfile: cmd/bot/Dockerfile
    env_file:
      - .env
    depends_on:
      - scrapper
    environment:
      - BOT_API_PORT=63342
      - SCRAPPER_URL="scrapper:63343"
      - BOT_API_PROTOCOL="grpc"
      - SCRAPPER_API_PROTOCOL="grpc"

  scrapper:
    build:
      context: .
      dockerfile: cmd/scrapper/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - BOT_URL="bot:63342"
      - SCRAPPER_API_PORT=63343
      - BOT_API_PROTOCOL="grpc"
      - SCRAPPER_API_PROTOCOL="grpc"

  postgres:
    image: postgres:17-alpine
    container_name: postgres_container
    env_file:
      - .env
    ports:
      - "5430:5432"
    volumes:
      - ./pgdata:${PGDATA}
    restart: unless-stopped
    tty: true
    stdin_open: true
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 3s
      timeout: 3s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
    driver: local