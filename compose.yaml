services:
  bot:
    build:
      context: .
      dockerfile: cmd/bot/Dockerfile
    env_file:
      - .env
    depends_on:
      - scrapper
    environment:
      - API_PROTOCOL="grpc"

  scrapper:
    build:
      context: .
      dockerfile: cmd/scrapper/Dockerfile
    env_file:
      - .env
    environment:
      - API_PROTOCOL="grpc"

networks:
  app-network:
    driver: bridge